<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Github Bersama miaw miaw</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin: 0;
            margin-bottom: 25px;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            text-decoration: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-about {
            background-color: #ff758c;
        }
        .btn-about:hover {
            background-color: #ff3b68;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 117, 140, 0.4);
        }
        .btn-profile {
            background-color: #3b82f6;
        }
        .btn-profile:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Belajar Github Bersama Bayu!!</h1>
        <div class="nav-buttons">
            <a href="about.html" class="btn btn-about">Tentang Kami</a>
            <a href="profile.html" class="btn btn-profile">Profil</a>
        </div>
    </div>
</body>
</html>
